name: Validate Sagan Legacy Rules

on:
  push:
    branches: [main, develop]
    paths:
      - '**.rules'
      - '**.rule'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.rules'
      - '**.rule'

jobs:
  validate:
    name: Sagan Rule Syntax Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Sagan rule validator
        run: |
          FILES=$(find . -type f \( -name "*.rules" -o -name "*.rule" \) | sort)
          python3 .github/scripts/validate_sagan_rules.py $FILES
